name: Build Dawn

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Dawn branch to build (e.g., chromium/7725, main)'
        required: true
        default: 'chromium/7725'
        type: string
      build_type:
        description: 'Build type (shared or static)'
        required: true
        default: 'static'
        type: choice
        options:
          - shared
          - static
      release_tag:
        description: 'Release tag to publish distro artifacts (leave empty to skip release)'
        required: false
        default: ''
        type: string

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4

permissions:
  contents: write

jobs:
  # ── Prepare: create dynamic matrix for target platforms ────────────────
  # instead of the standard static matrix, a JSON file is generated
  # based on the input and passed to the main job, and then used as 
  # a dynamic matrix
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Validate inputs
        run: |
          if [[ -z "${{ inputs.clang_ref_default }}" ]]; then
            echo "::error::clang_ref_default is required but was not provided or is empty"
            exit 1
          fi

      - name: Resolve target matrix
        id: resolve
        run: |
          ALL='[
            {"name":"macos-clang-21", "os":"macos-latest"},
            {"name":"linux-clang-21", "os":"ubuntu-latest"},
            {"name":"win-clang-21",   "os":"windows-latest"}
          ]'
          PLATFORM="${{ inputs.platform }}"
          if [[ "$PLATFORM" == "all" || -z "$PLATFORM" ]]; then
            MATRIX="$ALL"
          else
            MATRIX=$(echo "$ALL" | jq --arg p "$PLATFORM" '[.[] | select(.name == $p)]')
          fi
          echo "matrix=$(echo "$MATRIX" | jq -c .)" >> "$GITHUB_OUTPUT"

  # ── Main build job ─────────────────────────────────────────────────────
  build:
    needs: prepare
    runs-on: ${{ matrix.runtime.os }}
    strategy:
      matrix:
        runtime: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    
    steps:
      # ── Prepare source & tools ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.25'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libvulkan-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ninja

      - name: Clone Dawn repository
        run: |
          git clone --branch ${{ github.event.inputs.branch }} --depth 1 https://dawn.googlesource.com/dawn third_party/dawn

      - name: Make build script executable
        if: runner.os != 'Windows'
        run: chmod +x build.sh

      # ── Build ────────────────────────────────────────────────----------
      - name: Build Dawn (Unix)
        if: runner.os != 'Windows'
        run: ./build.sh build -${{ github.event.inputs.build_type }}

      - name: Build Dawn (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export DAWN_SRC=third_party/dawn
          export OUT=$DAWN_SRC/out/build_${{ github.event.inputs.build_type }}
          mkdir -p $OUT
          cmake -S $DAWN_SRC -B $OUT \
            -DDAWN_ENABLE_INSTALL=ON \
            -DDAWN_FETCH_DEPENDENCIES=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DDAWN_USE_GLFW=ON \
            -DDAWN_BUILD_TESTS=OFF \
            -DDAWN_BUILD_BENCHMARKS=OFF \
            -DDAWN_BUILD_SAMPLES=OFF \
            -DDAWN_BUILD_NODE_BINDINGS=OFF \
            -DTINT_BUILD_TESTS=OFF
          cmake --build $OUT -j 4

      # ── Local install ────────────────────────────────────────────────--
      - name: Install Dawn (Unix)
        if: runner.os != 'Windows'
        run: |
          export DAWN_ROOT="$GITHUB_WORKSPACE/dist/install"
          ./build.sh install -${{ github.event.inputs.build_type }}

      - name: Install Dawn (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          INSTALL_PREFIX="$GITHUB_WORKSPACE/dist/install/${{ github.event.inputs.build_type }}"
          BUILD_DIR="third_party/dawn/out/build_${{ github.event.inputs.build_type }}"
          mkdir -p "$INSTALL_PREFIX"
          cmake --install "$BUILD_DIR" --prefix "$INSTALL_PREFIX"

      # ── Package for distro ─────────────────────────────────────────────
      - name: Package installed distribution
        shell: bash
        run: |
          BRANCH_SAFE=$(echo "${{ github.event.inputs.branch }}" | tr '/ ' '__')
          INSTALL_DIR="$GITHUB_WORKSPACE/dist/install/${{ github.event.inputs.build_type }}"
          PACKAGE_DIR="$GITHUB_WORKSPACE/dist/packages"
          PACKAGE_NAME="dawn-${{ runner.os }}-${{ github.event.inputs.build_type }}-${BRANCH_SAFE}.tar.gz"

          mkdir -p "$PACKAGE_DIR"
          tar -czf "$PACKAGE_DIR/$PACKAGE_NAME" -C "$INSTALL_DIR" .
          echo "PACKAGED_FILE=$PACKAGE_DIR/$PACKAGE_NAME" >> "$GITHUB_ENV"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dawn-${{ runner.os }}-${{ github.event.inputs.build_type }}
          path: third_party/dawn/out/build_${{ github.event.inputs.build_type }}/
          retention-days: 7

      - name: Upload packaged install artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawn-${{ runner.os }}-${{ github.event.inputs.build_type }}-package
          path: ${{ env.PACKAGED_FILE }}
          retention-days: 30

      - name: Create build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.event.inputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Type: ${{ github.event.inputs.build_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- OS: ${{ runner.os }}" >> $GITHUB_STEP_SUMMARY
          echo "- Package: ${{ env.PACKAGED_FILE }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ✅ Success" >> $GITHUB_STEP_SUMMARY

  release:
    needs: build
    if: ${{ github.event.inputs.release_tag != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dawn-*-package
          path: dist/release-assets
          merge-multiple: true

      - name: Create GitHub release (distro packages only)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Dawn ${{ github.event.inputs.branch }} (${{ github.event.inputs.build_type }}) #${{ github.run_number }}
          generate_release_notes: true
          files: dist/release-assets/*.tar.gz
